<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book a Service - Domvex</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: #0b0f17; color: white; padding-bottom: 50px; }
        header { background-color: #0d1117; padding: 20px 8%; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #1f2937; }
        .logo-text h1 { font-size: 24px; font-weight: 900; color: #00d2ff; }
        .nav-actions { display: flex; gap: 10px; }
        .logout-btn { background: #ef4444; color: white; padding: 8px 16px; font-weight: 600; border-radius: 6px; border: none; cursor: pointer; }
        .bookings-btn { background: #6366f1; color: white; padding: 8px 16px; font-weight: 600; border-radius: 6px; border: none; cursor: pointer; }
        .booking-container { max-width: 600px; margin: 40px auto; padding: 30px; background: #111827; border: 1px solid #1f2937; border-radius: 16px; }
        .booking-container h2 { font-size: 28px; text-align: center; margin-bottom: 10px; }
        .booking-container p { color: #9ca3af; text-align: center; margin-bottom: 30px; }
        .form-group { margin-bottom: 22px; }
        .form-group label { display: block; font-size: 14px; color: #9ca3af; margin-bottom: 8px; font-weight: 600; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 12px; background: #1f2937; border: 1px solid #374151; border-radius: 8px; color: white; font-size: 15px; outline: none; }
        .book-btn { width: 100%; padding: 15px; border: none; border-radius: 8px; background: #00d2ff; color: #0b0f17; font-weight: 700; font-size: 17px; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <div class="logo-text"><h1 id="welcomeTitle">DOMVEX</h1></div>
        <div class="nav-actions">
            <button class="bookings-btn" onclick="window.location.href='my-bookings.html'">My Bookings</button>
            <button class="logout-btn" onclick="logout()">Log Out</button>
        </div>
    </header>

    <div class="booking-container">
        <h2>Book Your Home Service</h2>
        <p>Enter details and our expert will reach your doorstep instantly.</p>
        
        <form id="bookingForm">
            <div class="form-group">
                <label>Registered Mobile Number</label>
                <input type="tel" id="bookPhone" readonly required>
            </div>
            <div class="form-group">
                <label>Select Required Service</label>
                <select id="bookService" required>
                    <option value="">-- Choose a Service --</option>
                    <option value="Electrician">⚡ Electrician (Wiring, Repair)</option>
                    <option value="Plumber">🚰 Plumber (Leakage, Fitting)</option>
                    <option value="AC Repair">❄️ AC Repair & Servicing</option>
                    <option value="Cleaning">🧹 Deep House Cleaning</option>
                    <option value="Beauty/Spa">💄 Beauty/Spa (Salon, Grooming)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Full Service Address</label>
                <textarea id="bookAddress" rows="3" required></textarea>
            </div>
            <button type="submit" class="book-btn">Book Appointment Now</button>
        </form>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCpoTdWajiA1rjX6AzIJ10hZ_EkW5YrmNE",
            authDomain: "domvex-45097.firebaseapp.com",
            databaseURL: "https://domvex-45097-default-rtdb.firebaseio.com/",
            projectId: "domvex-45097",
            storageBucket: "domvex-45097.firebasestorage.app",
            messagingSenderId: "317471334986",
            appId: "1:317471334986:web:c9f1a80e93ad1f13c93cb3"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const database = firebase.database();

        window.onload = function() {
            const name = localStorage.getItem('customerName');
            const phone = localStorage.getItem('customerPhone');
            if(!phone) {
                alert('Pehle login karein!');
                window.location.href = 'index.html';
            } else {
                document.getElementById('welcomeTitle').innerText = "DOMVEX - Hi, " + name;
                document.getElementById('bookPhone').value = phone;
            }
        }

        document.getElementById('bookingForm').onsubmit = function(e) {
            e.preventDefault();
            const phone = document.getElementById('bookPhone').value;
            const service = document.getElementById('bookService').value;
            const address = document.getElementById('bookAddress').value;
            const name = localStorage.getItem('customerName');
            const bookingId = "BK" + Math.floor(100000 + Math.random() * 900000);

            database.ref('bookings/' + bookingId).set({
                bookingId: bookingId,
                customerName: name,
                phone: phone,
                service: service,
                address: address,
                timestamp: new Date().toLocaleString(),
                status: "Pending"
            }, function(err) {
                if(!err) {
                    alert('🚀 Booking Confirmed! ID: ' + bookingId);
                    window.location.href = 'my-bookings.html';
                }
            });
        };

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
