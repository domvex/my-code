<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Dashboard - Domvex</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: #0b0f17; color: white; padding-bottom: 50px; }
        header { background-color: #0d1117; padding: 20px 8%; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #1f2937; }
        .logo-text h1 { font-size: 24px; font-weight: 900; color: #00d2ff; }
        .nav-actions { display: flex; gap: 15px; align-items: center; }
        .book-more-btn { background: #00d2ff; color: #0b0f17; padding: 8px 16px; font-weight: 700; border-radius: 6px; border: none; cursor: pointer; text-decoration: none; font-size: 14px; }
        .logout-btn { background: #ef4444; color: white; padding: 8px 16px; font-weight: 600; border-radius: 6px; border: none; cursor: pointer; }
        .dashboard-container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        h2 { font-size: 26px; margin-bottom: 25px; font-weight: 700; border-left: 4px solid #00d2ff; padding-left: 12px; }
        .history-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        .history-card { background: #111827; border: 1px solid #1f2937; border-radius: 12px; padding: 22px; display: flex; flex-direction: column; gap: 12px; position: relative; }
        .card-header { display: flex; justify-content: space-between; align-items: center; }
        .service-name { font-weight: 700; color: #fff; font-size: 17px; }
        .status-badge { font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 20px; text-transform: uppercase; }
        .status-pending { background: rgba(245, 158, 11, 0.15); color: #f59e0b; border: 1px solid rgba(245, 158, 11, 0.3); }
        .status-accepted { background: rgba(59, 130, 246, 0.15); color: #3b82f6; border: 1px solid rgba(33, 150, 243, 0.3); }
        .status-completed { background: rgba(16, 185, 129, 0.15); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.3); }
        .card-body { font-size: 14px; color: #9ca3af; line-height: 1.6; }
        .worker-assignment-box { background: #1f2937; border-radius: 8px; padding: 12px; margin-top: 5px; border: 1px solid #374151; }
        .call-btn { background: #10b981; color: white; padding: 8px; border-radius: 5px; text-decoration: none; display: block; text-align: center; font-weight: bold; margin-top: 8px; cursor: pointer; border: none; width: 100%; }
        select { background: #111827; color: white; padding: 5px; border-radius: 4px; border: 1px solid #374151; }
    </style>
</head>
<body>

    <header>
        <div class="logo-text"><h1 id="custWelcomeTitle">DOMVEX DASHBOARD</h1></div>
        <div class="nav-actions">
            <a href="service.html" class="book-more-btn">+ Book New Service</a>
            <button class="logout-btn" onclick="logout()">Log Out</button>
        </div>
    </header>

    <div class="dashboard-container">
        <h2>Your Service Request History</h2>
        <div class="history-grid" id="historyContainer">
            <div class="no-bookings">Loading secure booking tracking logs...</div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCpoTdWajiA1rjX6AzIJ10hZ_EkW5YrmNE",
            authDomain: "domvex-45097.firebaseapp.com",
            databaseURL: "https://domvex-45097-default-rtdb.firebaseio.com/",
            projectId: "domvex-45097",
            storageBucket: "domvex-45097.firebasestorage.app",
            messagingSenderId: "317471334986",
            appId: "1:317471334986:web:c9f1a80e93ad1f13c93cb3"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const custName = localStorage.getItem('customerName');
        const custPhone = localStorage.getItem('customerPhone');

        window.onload = function() {
            if (!custPhone) {
                alert('Access Denied!');
                window.location.href = 'index.html';
            } else {
                document.getElementById('custWelcomeTitle').innerText = "DOMVEX • " + custName;
                fetchCustomerHistory();
            }
        }

        function fetchCustomerHistory() {
            database.ref('bookings').on('value', (snapshot) => {
                const container = document.getElementById('historyContainer');
                container.innerHTML = '';
                let totalRecordsFound = false;

                snapshot.forEach((child) => {
                    const b = child.val();
                    if (b.customerPhone === custPhone) {
                        totalRecordsFound = true;
                        const card = document.createElement('div');
                        card.className = 'history-card';
                        
                        let workerMarkup = '';
                        if (b.status === "Accepted" && b.acceptedBy) {
                            workerMarkup = `
                                <div class="worker-assignment-box">
                                    <h4>Assigned Professional</h4>
                                    <p>Contact: ${b.acceptedBy}</p>
                                    <a href="tel:${b.acceptedBy}" class="call-btn">📞 Call Worker</a>
                                </div>`;
                        } else if (b.status === "Completed") {
                            workerMarkup = `
                                <div class="worker-assignment-box">
                                    <h4>Rate Your Experience</h4>
                                    ${b.rating ? `<p>You rated: ⭐ ${b.rating}</p>` : `
                                        <select id="rating-${b.bookingId}">
                                            <option value="5">5 Stars</option><option value="4">4 Stars</option>
                                            <option value="3">3 Stars</option><option value="2">2 Stars</option>
                                            <option value="1">1 Star</option>
                                        </select>
                                        <button onclick="submitRating('${b.bookingId}', '${b.acceptedBy}')" class="call-btn">Submit Rating</button>
                                    `}
                                </div>`;
                        }

                        card.innerHTML = `
                            <div class="card-header">
                                <span class="service-name">${b.service}</span>
                                <span class="status-badge status-${b.status.toLowerCase()}">${b.status}</span>
                            </div>
                            <div class="card-body">
                                <p><strong>Address:</strong> ${b.address}</p>
                            </div>
                            ${workerMarkup}
                        `;
                        container.appendChild(card);
                    }
                });
                if (!totalRecordsFound) container.innerHTML = '<div class="no-bookings">No active bookings found.</div>';
            });
        }

        function submitRating(bookingId, workerPhone) {
            const rating = document.getElementById('rating-' + bookingId).value;
            database.ref('bookings/' + bookingId).update({ rating: rating });
            database.ref('workers/' + workerPhone + '/ratings/' + bookingId).set({ rating: rating });
            alert("Thank you for your rating!");
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
