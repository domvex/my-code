<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Dashboard - Domvex</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: #0b0f17; color: white; padding-bottom: 50px; }
        header { background-color: #0d1117; padding: 20px 8%; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #1f2937; }
        .logo-text h1 { font-size: 24px; font-weight: 900; color: #00d2ff; }
        .nav-actions { display: flex; gap: 15px; align-items: center; }
        .book-more-btn { background: #00d2ff; color: #0b0f17; padding: 8px 16px; font-weight: 700; border-radius: 6px; border: none; cursor: pointer; text-decoration: none; font-size: 14px; }
        .logout-btn { background: #ef4444; color: white; padding: 8px 16px; font-weight: 600; border-radius: 6px; border: none; cursor: pointer; }
        
        .dashboard-container { max-width: 1000px; margin: 40px auto; padding: 0 20px; }
        h2 { font-size: 26px; margin-bottom: 25px; font-weight: 700; border-left: 4px solid #00d2ff; padding-left: 12px; }
        
        .history-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        .history-card { background: #111827; border: 1px solid #1f2937; border-radius: 12px; padding: 22px; display: flex; flex-direction: column; gap: 12px; position: relative; }
        
        .card-header { display: flex; justify-content: space-between; align-items: center; }
        .service-name { font-weight: 700; color: #fff; font-size: 17px; }
        
        .status-badge { font-size: 12px; font-weight: 700; padding: 4px 10px; border-radius: 20px; text-transform: uppercase; }
        .status-pending { background: rgba(245, 158, 11, 0.15); color: #f59e0b; border: 1px solid rgba(245, 158, 11, 0.3); }
        .status-accepted { background: rgba(59, 130, 246, 0.15); color: #3b82f6; border: 1px solid rgba(33, 150, 243, 0.3); }
        .status-completed { background: rgba(16, 185, 129, 0.15); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.3); }
        
        .card-body { font-size: 14px; color: #9ca3af; line-height: 1.6; }
        .card-body p strong { color: #e5e7eb; }
        
        .worker-assignment-box { background: #1f2937; border-radius: 8px; padding: 12px; margin-top: 5px; border: 1px solid #374151; }
        .worker-assignment-box h4 { font-size: 13px; color: #00d2ff; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
        .worker-assignment-box p { font-size: 13px; color: #e5e7eb; }

        .no-bookings { text-align: center; color: #9ca3af; padding: 60px 40px; background: #111827; border-radius: 12px; border: 1px dashed #374151; width: 100%; grid-column: 1/-1; }

        /* FLOATING TOAST NOTIFICATION STYLING */
        .live-toast-notification { position: fixed; top: 25px; right: 25px; background: #1e293b; border: 2px solid #00d2ff; padding: 18px 24px; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.6); display: none; z-index: 999999; max-width: 360px; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        .toast-header { font-weight: 800; color: #00d2ff; margin-bottom: 4px; font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px; }
        .toast-body { font-size: 13px; color: #e5e7eb; line-height: 1.4; }
    </style>
</head>
<body>

    <header>
        <div class="logo-text"><h1 id="custWelcomeTitle">DOMVEX DASHBOARD</h1></div>
        <div class="nav-actions">
            <a href="service.html" class="book-more-btn">+ Book New Service</a>
            <button class="logout-btn" onclick="logout()">Log Out</button>
        </div>
    </header>

    <div class="dashboard-container">
        <h2>Your Service Request History</h2>
        <div class="history-grid" id="historyContainer">
            <div class="no-bookings">Loading secure booking tracking logs...</div>
        </div>
    </div>

    <div class="live-toast-notification" id="liveToast">
        <div class="toast-header" id="toastTitle">Notification</div>
        <div class="toast-body" id="toastMessage">Database parameters synchronized successfully.</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCpoTdWajiA1rjX6AzIJ10hZ_EkW5YrmNE",
            authDomain: "domvex-45097.firebaseapp.com",
            databaseURL: "https://domvex-45097-default-rtdb.firebaseio.com/",
            projectId: "domvex-45097",
            storageBucket: "domvex-45097.firebasestorage.app",
            messagingSenderId: "317471334986",
            appId: "1:317471334986:web:c9f1a80e93ad1f13c93cb3"
        };
        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const custName = localStorage.getItem('customerName');
        const custPhone = localStorage.getItem('customerPhone');
        let oldBookingsData = null; // Cache register map

        window.onload = function() {
            if (!custPhone) {
                alert('Access Denied: Session broken.');
                window.location.href = 'index.html';
            } else {
                document.getElementById('custWelcomeTitle').innerText = "DOMVEX • " + custName;
                fetchCustomerHistory();
            }
        }

        function fetchCustomerHistory() {
            database.ref('bookings').on('value', (snapshot) => {
                const container = document.getElementById('historyContainer');
                container.innerHTML = '';
                let totalRecordsFound = false;

                if (snapshot.exists()) {
                    const data = snapshot.val();
                    
                    // --- REALT-TIME WORKER UPDATE CAPTURING ENGINE ---
                    if (oldBookingsData !== null) {
                        for (let id in data) {
                            if (data[id].customerPhone === custPhone || data[id].phone === custPhone) {
                                const oldRecord = oldBookingsData[id];
                                const newRecord = data[id];
                                
                                if (oldRecord && oldRecord.status === "Pending" && newRecord.status === "Accepted") {
                                    triggerLiveToast("Order Accepted! 🎉", `Your request for ${newRecord.service} has been successfully accepted by ${newRecord.workerName}.`);
                                }
                                if (oldRecord && oldRecord.status === "Accepted" && newRecord.status === "Completed") {
                                    triggerLiveToast("Job Completed! 🏅", `The status for ${newRecord.service} has been updated to completed.`);
                                }
                            }
                        }
                    }
                    oldBookingsData = data; 
                    
                    for (let key in data) {
                        const b = data[key];
                        if (b.customerPhone === custPhone || b.phone === custPhone) {
                            totalRecordsFound = true;
                            
                            const card = document.createElement('div');
                            card.className = 'history-card';
                            
                            let statusClass = 'status-pending';
                            if (b.status === "Accepted") statusClass = 'status-accepted';
                            if (b.status === "Completed") statusClass = 'status-completed';
                            
                            let workerMarkup = '';
                            if (b.status === "Accepted" && b.workerName) {
                                workerMarkup = `
                                    <div class="worker-assignment-box">
                                        <h4>Assigned Professional</h4>
                                        <p><strong>Name:</strong> ${b.workerName}</p>
                                        <p><strong>Contact:</strong> ${b.workerPhone}</p>
                                    </div>
                                `;
                            } else if (b.status === "Completed") {
                                workerMarkup = `
                                    <div class="worker-assignment-box" style="border-color: rgba(16, 185, 129, 0.4)">
                                        <h4 style="color: #10b981;">Job Successfully Completed</h4>
                                        <p>Served by ${b.workerName || 'Our Certified Expert'}</p>
                                    </div>
                                `;
                            }

                            card.innerHTML = `
                                <div class="card-header">
                                    <span class="service-name">${b.service}</span>
                                    <span class="status-badge ${statusClass}">${b.status}</span>
                                </div>
                                <div class="card-body">
                                    <p><strong>Booking ID:</strong> ${b.bookingId}</p>
                                    <p><strong>Schedule:</strong> ${b.date} • ${b.time}</p>
                                    <p><strong>Address:</strong> ${b.address}</p>
                                </div>
                                ${workerMarkup}
                            `;
                            container.appendChild(card);
                        }
                    }
                }

                if (!totalRecordsFound) {
                    container.innerHTML = '<div class="no-bookings">You haven\'t booked any premium home services yet.</div>';
                }
            });
        }

        function triggerLiveToast(title, message) {
            const toast = document.getElementById('liveToast');
            document.getElementById('toastTitle').innerText = title;
            document.getElementById('toastMessage').innerText = message;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 5500);
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
