<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, sans-serif; }
        body { background: #0f172a; color: white; padding: 15px; }
        
        /* Header section jaisa tumne dikhaya */
        .header-section { display: flex; justify-content: space-between; align-items: start; margin-bottom: 20px; }
        .user-info { font-size: 16px; font-weight: bold; color: #38bdf8; line-height: 1.2; }
        
        .nav-btns { display: flex; flex-direction: column; gap: 6px; }
        .btn { padding: 6px 12px; border-radius: 6px; border: none; cursor: pointer; font-size: 11px; font-weight: 700; text-align: center; }
        .btn-book { background: #22c55e; color: white; }
        .btn-logout { background: #f97316; color: white; }

        h2 { font-size: 15px; margin-bottom: 15px; border-left: 3px solid #38bdf8; padding-left: 8px; }
        
        .card { background: #1e293b; padding: 14px; border-radius: 10px; margin-bottom: 12px; }
        .status { float: right; padding: 3px 8px; border-radius: 5px; font-size: 9px; font-weight: bold; }
        
        .pending { background: #d97706; }
        .completed { background: #059669; }
        .accepted { background: #2563eb; }
        
        h3 { font-size: 13px; margin-bottom: 4px; }
        p { font-size: 11px; color: #94a3b8; }
    </style>
</head>
<body>

<div class="header-section">
    <div class="user-info">DOMVEX • <span id="userName">User</span></div>
    <div class="nav-btns">
        <button class="btn btn-book" onclick="location.href='index.html'">+ Book New Service</button>
        <button class="btn btn-logout" onclick="logout()">Log Out</button>
    </div>
</div>

<h2>Your Service Request History</h2>
<div id="bookingList"></div>

<script>
    document.getElementById('userName').innerText = localStorage.getItem('customerName') || "User";
    function logout() { window.location.href = 'index.html'; }

    const bookings = JSON.parse(localStorage.getItem('myBookings') || "[]");
    const container = document.getElementById('bookingList');

    bookings.slice().reverse().forEach(b => {
        let statusClass = b.status === 'COMPLETED' ? 'completed' : (b.status === 'ACCEPTED' ? 'accepted' : 'pending');
        container.innerHTML += `
            <div class="card">
                <span class="status ${statusClass}">${b.status || 'PENDING'}</span>
                <h3>${b.service}</h3>
                <p>Address: ${b.address}</p>
                <p>Date: ${new Date(b.date).toLocaleString()}</p>
            </div>
        `;
    });
</script>
</body>
</html>
