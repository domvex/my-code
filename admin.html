<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Domvex | Super Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0b0f17; color: white; padding: 20px; }
        
        #loginUI { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; }
        .login-box { background: #111827; padding: 40px; border-radius: 12px; border: 1px solid #1f2937; text-align: center; }
        input { padding: 12px; margin: 10px 0; width: 250px; background: #1f2937; border: 1px solid #374151; color: white; border-radius: 6px; }
        button { padding: 12px 24px; background: #00d2ff; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; }

        .metrics-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .metric-card { background: #111827; padding: 25px; border-radius: 12px; border: 1px solid #1f2937; text-align: center; }
        table { width: 100%; border-collapse: collapse; background: #111827; border-radius: 12px; overflow: hidden; margin-bottom: 30px; }
        th { background: #1f2937; padding: 15px; text-align: left; }
        td { padding: 15px; border-bottom: 1px solid #1f2937; }
        .btn-act { border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .del { background: #ef4444; color: white; }
        .ver { background: #10b981; color: white; }
    </style>
</head>
<body>

    <div class="login-box" id="loginUI">
        <h2>Admin Verification</h2>
        <input type="tel" id="adminPhone" placeholder="Enter Admin Number" maxlength="10">
        <button onclick="checkAuth()">Login to Dashboard</button>
    </div>

    <div id="dashboardUI" style="display:none;">
        <header style="display:flex; justify-content:space-between; margin-bottom: 20px;">
            <h1>System Overview</h1>
            <button onclick="location.reload()" style="width: auto; background: #ef4444;">Logout</button>
        </header>

        <div class="metrics-grid">
            <div class="metric-card"><h3>Customers</h3><div id="countCustomers" style="font-size: 30px;">0</div></div>
            <div class="metric-card"><h3>Workers</h3><div id="countWorkers" style="font-size: 30px;">0</div></div>
            <div class="metric-card"><h3>Bookings</h3><div id="countBookings" style="font-size: 30px;">0</div></div>
        </div>

        <h2>Active Bookings</h2>
        <table>
            <thead><tr><th>Booking ID</th><th>Customer</th><th>Service</th><th>Status</th><th>Action</th></tr></thead>
            <tbody id="adminTableBody"></tbody>
        </table>

        <h2>Registered Customers</h2>
        <table>
            <thead><tr><th>Name</th><th>Mobile Number</th><th>Action</th></tr></thead>
            <tbody id="customerTableBody"></tbody>
        </table>
        
        <h2>Registered Workers List</h2>
        <table>
            <thead><tr><th>Name</th><th>Phone</th><th>Skill</th><th>Aadhaar</th><th>Rating</th><th>Status</th><th>Action</th></tr></thead>
            <tbody id="workerTableBody"></tbody>
        </table>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyCpoTdWajiA1rjX6AzIJ10hZ_EkW5YrmNE", databaseURL: "https://domvex-45097-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function checkAuth() {
            if(document.getElementById('adminPhone').value === "7878463369") {
                document.getElementById('loginUI').style.display = 'none';
                document.getElementById('dashboardUI').style.display = 'block';
                loadData();
            } else { alert("Bhai, tu Admin nahi hai!"); }
        }

        function loadData() {
            // Load Customers
            database.ref('customers').on('value', snap => {
                const tbody = document.getElementById('customerTableBody');
                tbody.innerHTML = '';
                let count = 0;
                snap.forEach(child => {
                    count++;
                    tbody.innerHTML += `<tr><td>${child.val().name}</td><td>${child.key}</td><td><button class="btn-act del" onclick="remove('customers/${child.key}')">Remove</button></td></tr>`;
                });
                document.getElementById('countCustomers').innerText = count;
            });

            // Load Workers
            database.ref('workers').on('value', snap => {
                const tbody = document.getElementById('workerTableBody');
                tbody.innerHTML = '';
                let count = 0;
                snap.forEach(child => {
                    count++;
                    const w = child.val();
                    
                    // Rating Calculation
                    let total = 0, rateCount = 0;
                    if(w.ratings) {
                        for(let id in w.ratings) {
                            total += parseInt(w.ratings[id].rating);
                            rateCount++;
                        }
                    }
                    const avgRating = rateCount > 0 ? (total/rateCount).toFixed(1) : "0.0";

                    tbody.innerHTML += `<tr><td>${w.name}</td><td>${w.phone}</td><td>${w.skill}</td><td>[Aadhaar Redacted]</td><td>⭐ ${avgRating}</td><td>${w.verified ? '✅ Verified' : '❌ Pending'}</td><td>${!w.verified ? `<button class="btn-act ver" onclick="verify('${child.key}')">Verify</button>` : ''} <button class="btn-act del" onclick="remove('workers/${child.key}')">Delete</button></td></tr>`;
                });
                document.getElementById('countWorkers').innerText = count;
            });
            
            // Load Bookings
            database.ref('bookings').on('value', snap => {
                const tbody = document.getElementById('adminTableBody');
                tbody.innerHTML = '';
                let count = 0;
                snap.forEach(child => {
                    count++;
                    const b = child.val();
                    tbody.innerHTML += `<tr><td>${b.bookingId}</td><td>${b.customerName}</td><td>${b.service}</td><td>${b.status}</td><td><button class="btn-act del" onclick="remove('bookings/${child.key}')">Delete</button></td></tr>`;
                });
                document.getElementById('countBookings').innerText = count;
            });
        }

        function verify(key) { database.ref('workers/' + key).update({ verified: true }); }
        function remove(path) { if(confirm("Sure, delete karna hai?")) database.ref(path).remove(); }
    </script>
</body>
</html>
