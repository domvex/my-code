<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Domvex | Super Admin</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0b0f17; color: white; padding: 20px; }
        #loginUI { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 80vh; }
        .login-box { background: #111827; padding: 40px; border-radius: 12px; border: 1px solid #1f2937; text-align: center; }
        input { padding: 12px; margin: 10px 0; width: 250px; background: #1f2937; border: 1px solid #374151; color: white; border-radius: 6px; }
        button { padding: 12px 24px; background: #00d2ff; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; }
        .metrics-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 30px; }
        .metric-card { background: #111827; padding: 25px; border-radius: 12px; border: 1px solid #1f2937; text-align: center; }
        table { width: 100%; border-collapse: collapse; background: #111827; border-radius: 12px; overflow: hidden; margin-bottom: 30px; }
        th { background: #1f2937; padding: 15px; text-align: left; }
        td { padding: 15px; border-bottom: 1px solid #1f2937; }
        .btn-act { border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; margin-right: 5px; }
        .del { background: #ef4444; color: white; }
        .modal { display: none; position: fixed; z-index: 1; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.8); }
        .modal-content { background: #111827; margin: 5% auto; padding: 20px; border: 1px solid #1f2937; width: 450px; border-radius: 12px; max-height: 80vh; overflow-y: auto; }
    </style>
</head>
<body>
    <div id="workerModal" class="modal">
        <div class="modal-content">
            <h2>Worker Profile</h2>
            <div id="modalDetails" style="margin-top: 15px;"></div>
            <button onclick="document.getElementById('workerModal').style.display='none'" style="margin-top: 15px; background: #374151; width: 100%; padding: 10px; cursor: pointer;">Close</button>
        </div>
    </div>

    <div class="login-box" id="loginUI">
        <h2>Admin Verification</h2>
        <input type="tel" id="adminPhone" placeholder="Enter Admin Number" maxlength="10">
        <button onclick="checkAuth()">Login to Dashboard</button>
    </div>

    <div id="dashboardUI" style="display:none;">
        <header style="display:flex; justify-content:space-between; margin-bottom: 20px;">
            <h1>System Overview</h1>
            <button onclick="location.reload()" style="width: auto; background: #ef4444;">Logout</button>
        </header>

        <div class="metrics-grid">
            <div class="metric-card"><h3>Customers</h3><div id="countCustomers" style="font-size: 30px;">0</div></div>
            <div class="metric-card"><h3>Workers</h3><div id="countWorkers" style="font-size: 30px;">0</div></div>
            <div class="metric-card"><h3>Bookings</h3><div id="countBookings" style="font-size: 30px;">0</div></div>
        </div>

        <h2>Active Bookings</h2>
        <table>
            <thead><tr><th>Booking ID</th><th>Customer</th><th>Service</th><th>Assigned Worker</th><th>Date</th><th>Status</th><th>Action</th></tr></thead>
            <tbody id="adminTableBody"></tbody>
        </table>

        <h2>Registered Workers List</h2>
        <table>
            <thead><tr><th>Name</th><th>Phone</th><th>Skill</th><th>Status</th><th>Action</th></tr></thead>
            <tbody id="workerTableBody"></tbody>
        </table>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
        const firebaseConfig = { apiKey: "AIzaSyCpoTdWajiA1rjX6AzIJ10hZ_EkW5YrmNE", databaseURL: "https://domvex-45097-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function checkAuth() {
            if(document.getElementById('adminPhone').value === "7878463369") {
                document.getElementById('loginUI').style.display = 'none';
                document.getElementById('dashboardUI').style.display = 'block';
                loadData();
            } else { alert("Bhai, tu Admin nahi hai!"); }
        }

        function showWorkerDetails(w) {
            document.getElementById('modalDetails').innerHTML = `
                <p><strong>Name:</strong> ${w.name || 'N/A'}</p>
                <p><strong>Phone:</strong> ${w.phone || 'N/A'}</p>
                <p><strong>Aadhaar No:</strong> [Aadhaar Redacted]</p>
                <p><strong>Bank Account:</strong> ${w.bankAccount || 'Not Provided'}</p>
                <p><strong>Total Earnings:</strong> ₹${w.totalEarnings || 0}</p>
                <hr style="margin:10px 0;">
                <p><strong>Worker Photo:</strong><br><img src="${w.workerPhoto}" style="width:100px;"></p>
                <p><strong>Aadhaar Photo:</strong><br><img src="${w.aadhaarPhoto}" style="width:100px;"></p>
                <p><strong>Bank Photo:</strong><br><img src="${w.bankPhoto}" style="width:100px;"></p>
                <a href="Working_earning.html?phone=${w.phone}" style="display:block; margin-top:15px; color:#00d2ff;">View Full Earning History</a>
            `;
            document.getElementById('workerModal').style.display = 'block';
        }

        function verifyWorker(phone) { database.ref('workers/' + phone).update({ status: 'VERIFIED' }); alert("Worker Verified!"); }

        function warnWorker(key, name) {
            const ref = database.ref('workers/' + key);
            ref.once('value').then(snap => {
                let w = snap.val();
                let count = (w.warningCount || 0) + 1;
                if (count >= 3) { ref.update({ isBanned: true }); alert(name + " has been banned!"); } 
                else { ref.update({ warningCount: count }); alert(name + " warned."); }
            });
        }

        function remove(path) { if(confirm("Sure, delete?")) database.ref(path).remove(); }

        function loadData() {
            database.ref('customers').on('value', snap => { document.getElementById('countCustomers').innerText = snap.numChildren(); });
            
            database.ref('workers').on('value', snap => {
                const tbody = document.getElementById('workerTableBody');
                tbody.innerHTML = '';
                let count = 0;
                snap.forEach(child => {
                    count++;
                    const w = child.val();
                    tbody.innerHTML += `<tr>
                        <td>${w.name}</td><td>${w.phone}</td><td>${w.skill}</td>
                        <td>${w.status === 'VERIFIED' ? '✅' : `<button onclick="verifyWorker('${child.key}')" style="background:green; color:white; border:none; padding:5px;">Verify</button>`}</td>
                       // admin.html ke loadData function mein ye line change kar
<td>
    <button class="btn-act" onclick="window.location.href='worker_profile.html?phone=${w.phone}'">View</button>
    <button class="btn-act" style="background:#f59e0b;" onclick="warnWorker('${child.key}', '${w.name}')">Warn</button>
    <button class="btn-act del" onclick="remove('workers/${child.key}')">Del</button>
</td>
                    </tr>`;
                });
                document.getElementById('countWorkers').innerText = count;
            });

            database.ref('bookings').on('value', snap => {
                const tbody = document.getElementById('adminTableBody');
                tbody.innerHTML = '';
                snap.forEach(child => {
                    const b = child.val();
                    tbody.innerHTML += `<tr>
                        <td>${b.bookingId || 'N/A'}</td>
                        <td>${b.customerName || 'N/A'}</td>
                        <td>${b.service || 'N/A'}</td>
                        <td>${b.workerName || b.assignedWorkerName || 'Not Assigned'}</td>
                        <td>${b.date || 'N/A'}</td>
                        <td>${b.status || 'Pending'}</td>
                        <td><button class="btn-act del" onclick="remove('bookings/${child.key}')">Del</button></td>
                    </tr>`;
                });
                document.getElementById('countBookings').innerText = snap.numChildren();
            });
        }
    </script>
</body>
</html>
