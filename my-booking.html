<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Bookings - Domvex</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: #0b0f17; color: white; padding: 30px; }
        h1 { color: #00d2ff; text-align: center; margin-bottom: 30px; }
        .booking-card { background: #111827; border: 1px solid #1f2937; padding: 20px; border-radius: 12px; margin-bottom: 15px; }
        .status-badge { padding: 5px 10px; border-radius: 5px; font-weight: bold; font-size: 12px; }
        .pending { background: #fbbf24; color: #000; }
        .accepted { background: #10b981; color: #fff; }
    </style>
</head>
<body>

    <h1>My Bookings</h1>
    <div id="myBookingsList">Loading your bookings...</div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCpoTdWajiA1rjX6AzIJ10hZ_EkW5YrmNE",
            authDomain: "domvex-45097.firebaseapp.com",
            databaseURL: "https://domvex-45097-default-rtdb.firebaseio.com/",
            projectId: "domvex-45097",
            storageBucket: "domvex-45097.firebasestorage.app",
            messagingSenderId: "317471334986",
            appId: "1:317471334986:web:c9f1a80e93ad1f13c93cb3"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const database = firebase.database();

        window.onload = function() {
            const phone = localStorage.getItem('customerPhone');
            if(!phone) { window.location.href = 'index.html'; return; }

            database.ref('bookings').orderByChild('phone').equalTo(phone).on('value', (snap) => {
                const list = document.getElementById('myBookingsList');
                list.innerHTML = '';
                if(!snap.exists()) { list.innerHTML = '<p style="text-align:center;">No bookings found.</p>'; return; }
                
                snap.forEach((child) => {
                    const data = child.val();
                    list.innerHTML += `
                        <div class="booking-card">
                            <p><strong>Service:</strong> ${data.service}</p>
                            <p><strong>Booking ID:</strong> ${data.bookingId}</p>
                            <p><strong>Status:</strong> <span class="status-badge ${data.status ? data.status.toLowerCase() : 'pending'}">${data.status || 'Pending'}</span></p>
                            <p><small>${data.timestamp}</small></p>
                        </div>`;
                });
            });
        };
    </script>
</body>
</html>
