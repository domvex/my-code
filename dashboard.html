<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Domvex Worker Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: #0b0f17; color: white; padding: 30px; }
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        h1 { color: #00d2ff; font-weight: 800; }
        .logout-btn { background: #ef4444; color: white; padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; }
        .grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .panel { background: #111827; border: 1px solid #1f2937; padding: 25px; border-radius: 16px; }
        .card { background: #1f2937; border: 1px solid #374151; padding: 15px; border-radius: 10px; margin-bottom: 15px; }
        .status-pending { color: #fbbf24; font-weight: bold; }
        .status-accepted { color: #10b981; font-weight: bold; }
        .status-completed { color: #6366f1; font-weight: bold; }
        .action-btn { background: #00d2ff; color: #0b0f17; border: none; padding: 8px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 10px; margin-right: 5px; }
        .complete-btn { background: #10b981; color: white; }
    </style>
</head>
<body>

    <header>
        <h1>WORKER DASHBOARD</h1>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </header>
    
    <div class="grid-container">
        <div class="panel">
            <h2 style="color: #00d2ff;">🛒 Live Booking Requests</h2>
            <div id="liveBookings">Loading...</div>
        </div>
        <div class="panel">
            <h2 style="color: #9b51e0;">👷 Expert Network</h2>
            <div id="liveWorkers">Loading...</div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
        // Security Check
        window.onload = function() {
            if (!localStorage.getItem('workerPhone')) {
                alert("Access Denied! Login required.");
                window.location.href = 'index.html';
            }
        };

        const firebaseConfig = {
            apiKey: "AIzaSyCpoTdWajiA1rjX6AzIJ10hZ_EkW5YrmNE",
            authDomain: "domvex-45097.firebaseapp.com",
            databaseURL: "https://domvex-45097-default-rtdb.firebaseio.com/",
            projectId: "domvex-45097",
            storageBucket: "domvex-45097.firebasestorage.app",
            messagingSenderId: "317471334986",
            appId: "1:317471334986:web:c9f1a80e93ad1f13c93cb3"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Realtime Bookings
        database.ref('bookings').on('value', (snap) => {
            const container = document.getElementById('liveBookings');
            container.innerHTML = '';
            snap.forEach((child) => {
                const data = child.val();
                container.innerHTML += `
                    <div class="card">
                        <p><strong>ID:</strong> ${data.bookingId} <span class="status-${data.status.toLowerCase()}">[${data.status}]</span></p>
                        <p><strong>Customer:</strong> ${data.customerName}</p>
                        <p><strong>Service:</strong> ${data.service}</p>
                        <p><strong>Address:</strong> ${data.address}</p>
                        ${data.status === 'Pending' ? `<button class="action-btn" onclick="updateStatus('${data.bookingId}', 'Accepted')">Accept</button>` : ''}
                        ${data.status === 'Accepted' ? `<button class="action-btn complete-btn" onclick="updateStatus('${data.bookingId}', 'Completed')">Complete</button>` : ''}
                    </div>`;
            });
        });

        function updateStatus(id, newStatus) {
            database.ref('bookings/' + id).update({ status: newStatus });
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        // Realtime Workers
        database.ref('workers').on('value', (snap) => {
            const container = document.getElementById('liveWorkers');
            container.innerHTML = '';
            snap.forEach((child) => {
                const data = child.val();
                container.innerHTML += `<div class="card"><p><strong>${data.name}</strong> - ${data.skill}</p></div>`;
            });
        });
    </script>
</body>
</html>
