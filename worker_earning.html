<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worker Earnings - Domvex</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Arial, sans-serif; }
        body { background-color: #0b0f17; color: white; padding-bottom: 50px; }
        header { background-color: #0d1117; padding: 20px 8%; border-bottom: 1px solid #1f2937; }
        .logo-text h1 { font-size: 24px; color: #00d2ff; }
        
        .container { max-width: 800px; margin: 40px auto; padding: 20px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
        
        .stat-card { background: #111827; padding: 25px; border-radius: 16px; border: 1px solid #1f2937; text-align: center; }
        .stat-card h3 { color: #9ca3af; font-size: 14px; margin-bottom: 10px; }
        .stat-card p { font-size: 28px; font-weight: 800; color: #ffffff; }
        
        .recent-jobs { background: #111827; padding: 25px; border-radius: 16px; border: 1px solid #1f2937; }
        .recent-jobs h2 { margin-bottom: 20px; }
    </style>
</head>
<body>

    <header>
        <div class="logo-text"><h1>DOMVEX <span style="font-size: 14px; color: #6366f1;">Worker Portal</span></h1></div>
    </header>

    <div class="container">
        <div class="stats-grid">
            <div class="stat-card"><h3>Aaj ki Earning</h3><p id="todayEarn">₹0</p></div>
            <div class="stat-card"><h3>Total Earning</h3><p id="totalEarn">₹0</p></div>
            <div class="stat-card"><h3>Total Jobs</h3><p id="totalJobs">0</p></div>
        </div>

        <div class="recent-jobs">
            <h2>Recent Job History</h2>
            <div id="jobList">
                <p style="color: #9ca3af;">Loading jobs...</p>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCpoTdWajiA1rjX6AzIJ10hZ_EkW5YrmNE",
            databaseURL: "https://domvex-45097-default-rtdb.firebaseio.com/",
            projectId: "domvex-45097",
            storageBucket: "domvex-45097.firebasestorage.app",
            messagingSenderId: "317471334986",
            appId: "1:317471334986:web:c9f1a80e93ad1f13c93cb3"
        };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // Worker ka phone number localStorage se uthao (jo login ke waqt save kiya tha)
        const workerPhone = localStorage.getItem('workerPhone');

        window.onload = function() {
            if(!workerPhone) {
                alert("Pehle login karein!");
                window.location.href = 'index.html';
                return;
            }
            fetchEarnings();
        };

        function fetchEarnings() {
            // Firebase se data lekar card update karo
            database.ref('workers/' + workerPhone + '/stats').on('value', (snapshot) => {
                const data = snapshot.val();
                if(data) {
                    document.getElementById('todayEarn').innerText = "₹" + (data.today || 0);
                    document.getElementById('totalEarn').innerText = "₹" + (data.total || 0);
                    document.getElementById('totalJobs').innerText = (data.jobsCount || 0);
                }
            });
        }
    </script>
</body>
</html>
